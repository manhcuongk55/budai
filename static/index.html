<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>budAI — 布袋 AI · Túi vải chứa tri thức</title>
    <meta name="description"
        content="budAI — AI cười tươi, giá nhân từ. Upload tài liệu, hỏi đáp AI thông minh. Hỗ trợ tiếng Việt, Myanmar, Khmer, Lao.">
    <link rel="icon" href="/static/budai_logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0C;
            --bg2: #111116;
            --bg3: #1A1A22;
            --text: #E8E4DA;
            --muted: #6A6A72;
            --gold: #C9A84C;
            --gold-deep: #8B7D4A;
            --gold-soft: rgba(201, 168, 76, 0.12);
            --gold-border: rgba(201, 168, 76, 0.2);
            --saffron: #E8941A;
            --saffron-soft: rgba(232, 148, 26, 0.1);
            --green: #4ECB71;
            --red: #E05252;
            --radius: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ──── Sidebar ──── */
        .sidebar {
            width: 300px;
            background: var(--bg2);
            border-right: 1px solid var(--gold-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--gold-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-header img {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 3px;
        }

        .logo-sub {
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.5px;
        }

        /* Upload */
        .upload-section {
            padding: 14px;
            border-bottom: 1px solid var(--gold-border);
        }

        .upload-zone {
            border: 2px dashed var(--gold-border);
            border-radius: var(--radius);
            padding: 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .upload-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, var(--gold-soft) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .upload-zone:hover::before,
        .upload-zone.dragover::before {
            opacity: 1;
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: var(--gold);
        }

        .upload-zone .icon {
            font-size: 1.5rem;
            margin-bottom: 4px;
            position: relative;
        }

        .upload-zone p {
            font-size: 0.72rem;
            color: var(--muted);
            line-height: 1.6;
            position: relative;
        }

        .upload-zone input {
            display: none;
        }

        /* Doc list */
        .docs-section {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .docs-title {
            font-size: 0.65rem;
            color: var(--gold-deep);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            padding: 0 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .doc-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: 8px;
            font-size: 0.78rem;
            cursor: default;
            transition: background 0.2s;
        }

        .doc-item:hover {
            background: var(--gold-soft);
        }

        .doc-item .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
        }

        .doc-item .name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .doc-item .chunks {
            font-size: 0.65rem;
            color: var(--muted);
        }

        .doc-item .del {
            opacity: 0;
            cursor: pointer;
            color: var(--red);
            transition: opacity 0.2s;
            font-size: 0.7rem;
        }

        .doc-item:hover .del {
            opacity: 1;
        }

        /* Sidebar footer */
        .sidebar-footer {
            padding: 10px 14px;
            border-top: 1px solid var(--gold-border);
            display: flex;
            gap: 6px;
        }

        .sidebar-footer button {
            flex: 1;
            padding: 8px 4px;
            background: var(--bg3);
            border: 1px solid var(--gold-border);
            border-radius: 8px;
            color: var(--muted);
            font-size: 0.68rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar-footer button:hover {
            color: var(--gold);
            border-color: var(--gold);
        }

        .sidebar-footer .dharma-btn {
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.15), rgba(232, 148, 26, 0.1));
            color: var(--gold);
            border-color: var(--gold);
            font-weight: 500;
        }

        .sidebar-footer .dharma-btn:hover {
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.25), rgba(232, 148, 26, 0.2));
        }

        /* ──── Main ──── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header */
        .chat-header {
            padding: 12px 24px;
            border-bottom: 1px solid var(--gold-border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg2);
        }

        .chat-header h2 {
            font-size: 0.9rem;
            font-weight: 500;
            flex: 1;
            color: var(--text);
        }

        .strategy-toggle {
            display: flex;
            gap: 3px;
            background: var(--bg);
            border-radius: 8px;
            padding: 2px;
        }

        .strategy-toggle button {
            padding: 5px 12px;
            font-size: 0.68rem;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .strategy-toggle button.active {
            background: var(--gold-soft);
            color: var(--gold);
        }

        /* Chat body */
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .msg {
            max-width: 72%;
            padding: 14px 18px;
            border-radius: var(--radius);
            font-size: 0.86rem;
            line-height: 1.7;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--gold-soft), var(--saffron-soft));
            border: 1px solid var(--gold-border);
        }

        .msg.ai {
            align-self: flex-start;
            background: var(--bg3);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .msg .meta {
            margin-top: 10px;
            font-size: 0.68rem;
            color: var(--muted);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .msg .meta .cost {
            color: var(--green);
        }

        .msg .sources {
            margin-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 8px;
        }

        .msg .sources summary {
            font-size: 0.73rem;
            color: var(--muted);
            cursor: pointer;
        }

        .msg .source-item {
            background: var(--bg);
            padding: 8px 10px;
            border-radius: 6px;
            margin-top: 6px;
            font-size: 0.72rem;
            color: var(--muted);
            line-height: 1.5;
        }

        /* Welcome */
        .welcome {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .welcome-inner {
            max-width: 440px;
        }

        .welcome-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid var(--gold-border);
            box-shadow: 0 0 40px rgba(201, 168, 76, 0.15);
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(201, 168, 76, 0.1);
            }

            50% {
                box-shadow: 0 0 50px rgba(201, 168, 76, 0.25);
            }
        }

        .welcome h2 {
            font-size: 1.2rem;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .welcome .tagline {
            font-size: 0.82rem;
            color: var(--text);
            margin-bottom: 4px;
        }

        .welcome .subtitle {
            font-size: 0.72rem;
            color: var(--muted);
            font-style: italic;
            margin-bottom: 20px;
        }

        .welcome .hint {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .welcome .hint button {
            padding: 11px 16px;
            background: var(--bg3);
            border: 1px solid var(--gold-border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.8rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.25s;
        }

        .welcome .hint button:hover {
            border-color: var(--gold);
            background: var(--gold-soft);
            transform: translateX(4px);
        }

        /* Input */
        .chat-input {
            padding: 14px 24px;
            background: var(--bg2);
            border-top: 1px solid var(--gold-border);
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .input-row textarea {
            flex: 1;
            background: var(--bg3);
            border: 1px solid var(--gold-border);
            border-radius: var(--radius);
            padding: 12px 16px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.86rem;
            resize: none;
            outline: none;
            height: 46px;
            transition: border-color 0.2s;
        }

        .input-row textarea:focus {
            border-color: var(--gold);
        }

        .input-row textarea::placeholder {
            color: var(--muted);
        }

        .send-btn {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, var(--gold), var(--saffron));
            border: none;
            border-radius: var(--radius);
            color: var(--bg);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(201, 168, 76, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: default;
            transform: none;
            box-shadow: none;
        }

        /* Typing */
        .typing {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: 0.2;
            }

            40% {
                opacity: 1;
            }
        }

        /* Status */
        .status-bar {
            padding: 5px 24px;
            background: var(--bg);
            font-size: 0.66rem;
            color: var(--muted);
            display: flex;
            gap: 16px;
            border-top: 1px solid var(--gold-border);
        }

        .status-bar .online {
            color: var(--green);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            right: 24px;
            background: var(--bg3);
            border: 1px solid var(--gold-border);
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 0.8rem;
            z-index: 100;
            animation: fadeUp 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .toast.error {
            border-color: var(--red);
            color: var(--red);
        }

        .toast.success {
            border-color: var(--green);
            color: var(--green);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }

            .sidebar-header img {
                width: 32px;
                height: 32px;
            }

            .logo-text,
            .upload-section,
            .docs-section,
            .sidebar-footer {
                display: none;
            }
        }

        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold-border);
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="/static/budai_logo.png" alt="布袋">
            <div class="logo-text">
                <div class="logo">budAI</div>
                <div class="logo-sub">布袋 · Túi vải chứa tri thức</div>
            </div>
        </div>

        <div class="upload-section">
            <div class="upload-zone" id="uploadZone">
                <div class="icon">📄</div>
                <p>Kéo thả file hoặc click<br>PDF · DOCX · TXT · MD</p>
                <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.md,.csv,.json" multiple>
            </div>
        </div>

        <div class="docs-section">
            <div class="docs-title">📚 Trong túi vải</div>
            <div id="docList">
                <div style="text-align:center;padding:16px;color:var(--muted);font-size:0.72rem;">
                    Túi vải đang trống
                </div>
            </div>
        </div>

        <div class="sidebar-footer">
            <button class="dharma-btn" onclick="loadDharma()">🪷 Dharma</button>
            <button onclick="loadTestData()">📥 Test</button>
            <button onclick="window.open('/docs')">📖 API</button>
            <button onclick="showProviders()">⚡ Info</button>
        </div>
    </aside>

    <main class="main">
        <div class="chat-header">
            <h2>布袋 budAI</h2>
            <div class="strategy-toggle">
                <button class="active" data-s="cheapest">💰 Rẻ</button>
                <button data-s="fastest">⚡ Nhanh</button>
                <button data-s="best">🏆 Tốt</button>
            </div>
        </div>

        <div class="chat-body" id="chatBody">
            <div class="welcome" id="welcome">
                <div class="welcome-inner">
                    <img class="welcome-img" src="/static/budai_hero.png" alt="Budai">
                    <h2>budAI · 布袋</h2>
                    <div class="tagline">AI cười tươi, giá nhân từ</div>
                    <div class="subtitle">Mang túi vải chứa tri thức, cho đi không giữ lại</div>
                    <div class="hint">
                        <button onclick="loadDharmaAndAsk()">🪷 Nạp kinh Phật & hỏi đáp nghĩa kinh</button>
                        <button onclick="askHint('Sắc tức thị không nghĩa là gì? Giải thích theo Bát Nhã Tâm Kinh')">🧘
                            Sắc tức thị không — nghĩa là gì?</button>
                        <button onclick="askHint('Bát Chánh Đạo gồm những gì? Giải thích từng phần')">☸️ Bát Chánh Đạo
                            là gì?</button>
                        <button onclick="askHint('Tóm tắt nội dung các tài liệu đã nạp')">💡 Tóm tắt tài liệu trong
                            túi</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-input">
            <div class="input-row">
                <textarea id="msgInput" placeholder="Hỏi Bố Đại bất kỳ câu gì..." rows="1"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
            </div>
        </div>

        <div class="status-bar">
            <span id="statusDot" class="online">● online</span>
            <span id="providerInfo">providers: đang kiểm tra...</span>
            <span id="costTotal">tổng chi phí: $0.000000</span>
        </div>
    </main>

    <script>
        const API = '/api/v1';
        let strategy = 'cheapest';
        let totalCost = 0;

        // Strategy toggle
        document.querySelectorAll('.strategy-toggle button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.strategy-toggle button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                strategy = btn.dataset.s;
            });
        });

        // File Upload
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', e => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', e => handleFiles(e.target.files));

        async function handleFiles(files) { for (const f of files) await uploadFile(f); }

        async function uploadFile(file) {
            toast(`Bố Đại đang nhận ${file.name}...`, 'info');
            const form = new FormData();
            form.append('file', file);
            try {
                const res = await fetch(`${API}/documents/upload?strategy=${strategy}`, { method: 'POST', body: form });
                const data = await res.json();
                if (res.ok) {
                    toast(`✅ ${file.name} — ${data.chunk_count} chunks, $${data.embedding_cost_usd.toFixed(6)}`, 'success');
                    totalCost += data.embedding_cost_usd;
                    updateCost(); refreshDocs();
                } else toast(`❌ ${file.name}: ${data.detail || 'Error'}`, 'error');
            } catch (e) { toast(`❌ ${e.message}`, 'error'); }
        }

        // Documents
        async function refreshDocs() {
            try {
                const res = await fetch(`${API}/documents`);
                const docs = await res.json();
                const list = document.getElementById('docList');
                if (docs.length === 0) {
                    list.innerHTML = '<div style="text-align:center;padding:16px;color:var(--muted);font-size:0.72rem;">Túi vải đang trống</div>';
                    return;
                }
                list.innerHTML = docs.map(d => `
                    <div class="doc-item">
                        <span class="dot"></span>
                        <span class="name">${d.filename}</span>
                        <span class="chunks">${d.chunk_count}⊞</span>
                        <span class="del" onclick="deleteDoc('${d.doc_id}')">✕</span>
                    </div>
                `).join('');
            } catch (e) { }
        }

        async function deleteDoc(id) {
            await fetch(`${API}/documents/${id}`, { method: 'DELETE' });
            refreshDocs();
        }

        // Chat
        function addMsg(text, type, meta) {
            const w = document.getElementById('welcome');
            if (w) w.remove();
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            let html = text.replace(/\n/g, '<br>');
            if (meta) {
                html += `<div class="meta">`;
                if (meta.model) html += `<span>🔗 ${meta.model}</span>`;
                if (meta.cost !== undefined) html += `<span class="cost">💰 $${meta.cost.toFixed(6)}</span>`;
                if (meta.tokens) html += `<span>📊 ${meta.tokens} tokens</span>`;
                html += `</div>`;
            }
            if (meta && meta.sources && meta.sources.length > 0) {
                html += `<div class="sources"><details><summary>📎 ${meta.sources.length} nguồn từ túi vải</summary>`;
                meta.sources.forEach((s, i) => {
                    const score = s.relevance_score ? (s.relevance_score * 100).toFixed(0) : '?';
                    html += `<div class="source-item">[${i + 1}] ${score}% — ${s.chunk}</div>`;
                });
                html += `</details></div>`;
            }
            div.innerHTML = html;
            document.getElementById('chatBody').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }

        function addTyping() {
            const div = document.createElement('div');
            div.className = 'msg ai'; div.id = 'typing';
            div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            document.getElementById('chatBody').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }
        function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            addMsg(text, 'user');
            addTyping();
            document.getElementById('sendBtn').disabled = true;
            try {
                const res = await fetch(`${API}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text, strategy }),
                });
                removeTyping();
                const data = await res.json();
                if (res.ok) {
                    addMsg(data.answer, 'ai', {
                        model: data.model ? data.model.generation : '',
                        cost: data.cost ? data.cost.total_usd : 0,
                        tokens: data.tokens ? (data.tokens.generation_input + data.tokens.generation_output) : 0,
                        sources: data.sources,
                    });
                    if (data.cost) { totalCost += data.cost.total_usd; updateCost(); }
                } else addMsg(`❌ ${data.detail || JSON.stringify(data)}`, 'ai');
            } catch (e) { removeTyping(); addMsg(`❌ ${e.message}`, 'ai'); }
            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }

        function askHint(text) { document.getElementById('msgInput').value = text; sendMsg(); }

        // Dharma 🪷
        async function loadDharma() {
            toast('🪷 Bố Đại mở túi vải — nạp kinh Phật...', 'info');
            try {
                const res = await fetch(`${API}/dharma/ingest?strategy=${strategy}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) {
                    toast(`🪷 Nạp ${data.texts_ingested} kinh, ${data.total_chunks} chunks`, 'success');
                    totalCost += data.total_embedding_cost_usd;
                    updateCost(); refreshDocs();
                } else toast(`❌ ${data.detail || 'Error'}`, 'error');
            } catch (e) { toast(`❌ ${e.message}`, 'error'); }
        }

        async function loadDharmaAndAsk() {
            await loadDharma();
            document.getElementById('msgInput').value = 'Tóm tắt các kinh Phật trong túi vải. Giải thích ý nghĩa chính.';
            sendMsg();
        }

        // Test Data
        async function loadTestData() {
            toast('📥 Đang nạp test data...', 'info');
            try {
                const res = await fetch(`${API}/test-data/ingest?strategy=${strategy}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) {
                    toast(`✅ Nạp ${data.documents_ingested} tài liệu`, 'success');
                    totalCost += data.total_embedding_cost_usd;
                    updateCost(); refreshDocs();
                } else toast(`❌ ${data.detail || 'Error'}`, 'error');
            } catch (e) { toast(`❌ ${e.message}`, 'error'); }
        }

        // Providers
        async function showProviders() {
            try {
                const res = await fetch(`${API}/providers`);
                const data = await res.json();
                let msg = '⚡ Providers: ' + data.available.join(', ');
                msg += '\n\n📊 Embedding:\n';
                data.pricing.embedding.forEach(m => msg += `• ${m.provider}/${m.model}: $${m.input_cost_per_million}/1M — ${m.notes}\n`);
                msg += '\n📊 Generation:\n';
                data.pricing.generation.forEach(m => msg += `• ${m.provider}/${m.model}: $${m.input_cost_per_million}/$${m.output_cost_per_million}/1M — ${m.notes}\n`);
                addMsg(msg, 'ai');
            } catch (e) { toast('❌ Không kết nối được', 'error'); }
        }

        // Health
        async function checkHealth() {
            try {
                const res = await fetch(`${API}/health`);
                const data = await res.json();
                const providers = Object.keys(data.providers || {});
                const healthy = providers.filter(p => data.providers[p].status === 'healthy');
                document.getElementById('statusDot').className = 'online';
                document.getElementById('statusDot').textContent = '● online';
                document.getElementById('providerInfo').textContent = `providers: ${healthy.length}/${providers.length}`;
            } catch (e) {
                document.getElementById('statusDot').className = '';
                document.getElementById('statusDot').textContent = '● offline';
                document.getElementById('statusDot').style.color = 'var(--red)';
            }
        }

        function updateCost() {
            document.getElementById('costTotal').textContent = `tổng chi phí: $${totalCost.toFixed(6)}`;
        }

        function toast(msg, type = 'info') {
            document.querySelectorAll('.toast').forEach(t => t.remove());
            const div = document.createElement('div');
            div.className = `toast ${type}`;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        // Init
        checkHealth();
        refreshDocs();
        setInterval(checkHealth, 30000);
    </script>
</body>

</html>
